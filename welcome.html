<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSB Digital Banking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1a3d3a 0%, #0f2825 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: #1a3d3a;
            border-radius: 20px;
            padding: 50px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFD500, #FFC500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1a3d3a;
            font-size: 20px;
        }

        .header-title {
            color: #FFD500;
            font-size: 20px;
            font-weight: 700;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: #b0b0b0;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .illustration {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 150px;
            margin-bottom: 40px;
            font-size: 80px;
            position: relative;
        }

        .bank {
            color: #8aab6f;
            font-size: 70px;
            margin: 0 15px;
            opacity: 0.8;
        }

        .phone {
            width: 60px;
            height: 100px;
            background: #FFD500;
            border: 2px solid #FFD500;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 15px;
            position: relative;
        }

        .phone::after {
            content: '';
            width: 3px;
            height: 3px;
            background: #1a3d3a;
            border-radius: 50%;
            position: absolute;
            top: 8px;
            right: 8px;
        }

        .phone-screen {
            width: 40px;
            height: 50px;
            background: #1a3d3a;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFD500;
            font-size: 24px;
        }

        .house {
            color: #8aab6f;
            font-size: 70px;
            margin: 0 15px;
            opacity: 0.8;
        }

        .features {
            background: rgba(31, 67, 62, 0.6);
            border: 1px solid rgba(138, 171, 111, 0.3);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
        }

        .feature-title {
            font-size: 16px;
            font-weight: 700;
            color: #FFD500;
            margin-bottom: 8px;
        }

        .feature-desc {
            font-size: 13px;
            color: #b0b0b0;
            line-height: 1.5;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 15px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #FFD500;
            border-radius: 50%;
            opacity: 0.5;
        }

        .dot.active {
            opacity: 1;
            width: 20px;
            border-radius: 3px;
        }

        .cta-btn {
            width: 100%;
            background: linear-gradient(135deg, #FFD500, #FFC500);
            border: none;
            color: #1a3d3a;
            padding: 16px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: capitalize;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 213, 0, 0.4);
        }

        .cta-btn:active {
            transform: translateY(-1px);
        }

        @media (max-width: 480px) {
            .container {
                border-radius: 20px;
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .header-title {
                font-size: 18px;
            }
        }

        .psb-logo-large {
            width: 90px;
            height: 120px;
            margin: 0 auto 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- PSB Logo -->
        <img src="psb-logo.svg" alt="PSB Logo" class="psb-logo-large">

        <!-- Welcome Text -->
        <h1>Welcome to PSB Digital!</h1>
        <p class="subtitle">We have tailor-made products & services in store for you</p>

        <!-- Illustration -->
        <div class="illustration">
            <div class="bank">🏦</div>
            <div class="phone">
                <div class="phone-screen">💳</div>
            </div>
            <div class="house">🏠</div>
        </div>

        <!-- Quick Payments Feature -->
        <div class="features">
            <div class="feature-title">Quick Payments</div>
            <div class="feature-desc">Instant UPI transfers and bill payments</div>
            <div class="dots">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- CTA Button -->
        <button class="cta-btn" onclick="goToAuth()">Let's get started →</button>
    </div>

    <script>
        function goToAuth() {
            // Redirect to registration or login page
            // For now, redirect to registration
            localStorage.setItem('welcomeViewed', 'true');
            window.location.href = '/register.html';
        }

        // Check if user has already viewed welcome
        window.addEventListener('load', () => {
            console.log('Welcome page loaded');
            console.log('Selected Language:', localStorage.getItem('selectedLanguage'));
        });
    </script>
</body>
</html>
