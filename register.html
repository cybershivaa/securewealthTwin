<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSB Digital - Register or Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1a3d3a 0%, #0f2825 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: #1a3d3a;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
        }

        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #FFD500, #FFC500);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
            font-size: 35px;
            font-weight: bold;
            color: #1a3d3a;
        }

        h1 {
            color: #FFD500;
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .subtitle {
            color: #999999;
            font-size: 13px;
            margin-bottom: 40px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 16px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: capitalize;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFD500, #FFC500);
            color: #1a3d3a;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 213, 0, 0.3);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #FFD500;
            color: #FFD500;
        }

        .btn-secondary:hover {
            background: rgba(255, 213, 0, 0.1);
            transform: translateY(-2px);
        }

        .divider {
            color: #666;
            margin: 25px 0;
            font-size: 12px;
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .social-btn {
            background: rgba(255, 213, 0, 0.1);
            border: 1px solid rgba(255, 213, 0, 0.3);
            color: #b0b0b0;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
        }

        .social-btn:hover {
            background: rgba(255, 213, 0, 0.15);
            border-color: rgba(255, 213, 0, 0.5);
        }

        .info-text {
            font-size: 11px;
            color: #666;
            margin-top: 20px;
            line-height: 1.5;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }
        }

        .psb-logo-circle {
            width: 85px;
            height: 115px;
            margin: 0 auto 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="psb-logo.svg" alt="PSB Logo" class="psb-logo-circle">
        <h1>PSB Digital</h1>
        <p class="subtitle">Your Banking Partner</p>

        <div class="button-group">
            <button class="btn-primary" onclick="goToRegister()">
                Create New Account
            </button>
            <button class="btn-secondary" onclick="goToLogin()">
                Already have an account? Sign In
            </button>
        </div>

        <div class="divider">OR</div>

        <div class="social-login">
            <button class="social-btn" onclick="alert('Google login coming soon!')">
                🔵 Sign in with Google
            </button>
            <button class="social-btn" onclick="alert('Facebook login coming soon!')">
                🔵 Sign in with Facebook
            </button>
            <button class="social-btn" onclick="alert('Biometric login coming soon!')">
                👆 Sign in with Biometric
            </button>
        </div>

        <p class="info-text">
            By signing in, you agree to our Terms of Service and Privacy Policy
        </p>
    </div>

    <script>
        function goToRegister() {
            console.log('Redirecting to registration...');
            window.location.href = '/register-flow.html';
        }

        function goToLogin() {
            console.log('Redirecting to login...');
            window.location.href = '/login.html';
        }

        // Log user's selected language
        window.addEventListener('load', () => {
            const lang = localStorage.getItem('selectedLanguage');
            console.log('User selected language:', lang);
        });
    </script>
</body>
</html>
