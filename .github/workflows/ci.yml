name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: securewealth
          POSTGRES_PASSWORD: securewealth
          POSTGRES_DB: securewealth
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U securewealth -d securewealth"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Initialize database
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://securewealth:securewealth@localhost:5432/securewealth
        run: |
          python scripts/create_tables.py
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://securewealth:securewealth@localhost:5432/securewealth
          REDIS_URL: redis://localhost:6379/0
          PYTHONPATH: /home/runner/work/securewealthTwin/securewealthTwin/backend
        run: |
          pytest tests/ -v --tb=short
