server:
  port: 8080

spring:
  application:
    name: psb-auth-service
  datasource:
    url: jdbc:postgresql://postgres:5432/psb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  redis:
    host: redis
    port: 6379
    database: 0

jwt:
  secret: "your-super-secret-key-minimum-32-characters-for-hs256-algorithm"
  expiration: 900000
  refresh-expiration: 2592000000
